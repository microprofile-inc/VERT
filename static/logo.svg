<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 79 300 342" width="100%" height="100%">
  <style>
    .cube-face {
      fill: #e8f0fe;
      stroke: #000000;
      stroke-width: 6;
      stroke-linejoin: round;
    }
    .label {
      font-family: system-ui, -apple-system, Arial, sans-serif;
      font-size: 36px;
      font-weight: 800;
      fill: #0052a3;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <!-- 2x2x2 Cube Faces -->
  <g class="cube-face">
    <!-- Top Face Quads -->
    <polygon points="300,170 369.28,130 300,90 230.72,130" />
    <polygon points="230.72,210 300,170 230.72,130 161.44,170" />
    <polygon points="369.28,210 438.56,170 369.28,130 300,170" />
    <polygon points="300,250 369.28,210 300,170 230.72,210" />

    <!-- Left Face Quads -->
    <polygon points="230.72,210 161.44,170 161.44,250 230.72,290" />
    <polygon points="300,250 230.72,210 230.72,290 300,330" />
    <polygon points="230.72,290 161.44,250 161.44,330 230.72,370" />
    <polygon points="300,330 230.72,290 230.72,370 300,410" />

    <!-- Right Face Quads -->
    <polygon points="300,250 369.28,210 369.28,290 300,330" />
    <polygon points="369.28,210 438.56,170 438.56,250 369.28,290" />
    <polygon points="300,330 369.28,290 369.28,370 300,410" />
    <polygon points="369.28,290 438.56,250 438.56,330 369.28,370" />
  </g>

  <!-- Labels staggered front-to-back across cube faces -->
  <!-- svg: top face, BACK (top quad) -->
  <g transform="translate(300, 130) matrix(0.866, -0.5, 0.866, 0.5, 0, 0)">
    <text class="label">svg</text>
  </g>
  <!-- eps: top face, FRONT (bottom quad) — diagonal opposite of svg -->
  <g transform="translate(300, 210) matrix(0.866, -0.5, 0.866, 0.5, 0, 0)">
    <text class="label">eps</text>
  </g>
  <!-- png: left face, BACK upper -->
  <g transform="translate(196.08, 230) matrix(0.866, 0.5, 0, 1, 0, 0)">
    <text class="label">png</text>
  </g>
  <!-- pdf: right face, FRONT upper -->
  <g transform="translate(334.64, 270) matrix(0.866, -0.5, 0, 1, 0, 0)">
    <text class="label">pdf</text>
  </g>
  <!-- ai: right face, BACK lower -->
  <g transform="translate(403.92, 310) matrix(0.866, -0.5, 0, 1, 0, 0)">
    <text class="label">ai</text>
  </g>
  <!-- jpg: left face, FRONT lower -->
  <g transform="translate(265.36, 350) matrix(0.866, 0.5, 0, 1, 0, 0)">
    <text class="label">jpg</text>
  </g>
</svg>
